<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SportManager Pro - Control de Caja</title>
    <style>
        :root {
            --bg: #121212;
            --surface: #1e1e1e;
            --primary: #00adb5;
            --success: #28a745;
            --danger: #dc3545;
            --text: #eeeeee;
            --text-secondary: #b3b3b3;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            background-color: var(--surface);
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
            width: 100%;
            max-width: 450px;
        }

        h2 {
            color: var(--primary);
            margin-top: 0;
            text-align: center;
            border-bottom: 2px solid #333;
            padding-bottom: 10px;
        }

        .status-badge {
            display: block;
            text-align: center;
            padding: 8px;
            font-weight: bold;
            border-radius: 6px;
            margin-bottom: 20px;
            text-transform: uppercase;
        }

        .status-badge.cerrada { background-color: rgba(220, 53, 69, 0.2); color: var(--danger); border: 1px solid var(--danger); }
        .status-badge.abierta { background-color: rgba(40, 167, 69, 0.2); color: var(--success); border: 1px solid var(--success); }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: var(--text-secondary);
        }

        input[type="number"] {
            width: 100%;
            padding: 12px;
            border-radius: 6px;
            border: 1px solid #444;
            background-color: #2a2a2a;
            color: var(--text);
            font-size: 1.1rem;
            box-sizing: border-box;
        }

        button {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 6px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s ease;
        }

        .btn-open { background-color: var(--success); color: white; }
        .btn-open:hover { background-color: #218838; }
        .btn-close { background-color: var(--danger); color: white; }
        .btn-close:hover { background-color: #c82333; }

        .info-box {
            background-color: #252525;
            padding: 15px;
            border-radius: 6px;
            margin-bottom: 20px;
            border-left: 4px solid var(--primary);
        }

        .info-box p { margin: 5px 0; font-size: 0.95rem; }
    </style>
</head>
<body>

<div class="container">
    <h2>Control de Caja Diaria</h2>
    <div id="cajaStatus" class="status-badge cerrada">Cargando Estado...</div>

    <div id="panelOperacion"></div>
</div>

<script>
    const API_URL = 'http://localhost/Gestion-canchas-deportivas-main/sportmanager_api/tienda/caja.php';
    let currentCajaId = null;

    // Verificar el estado de la caja al cargar la pantalla
    async function verificarEstadoCaja() {
        try {
            const res = await fetch(API_URL);
            const data = await res.json();
            
            const badge = document.getElementById('cajaStatus');
            const panel = document.getElementById('panelOperacion');

            if (data.status === 'Abierta') {
                badge.textContent = "Estado: Abierta";
                badge.className = "status-badge abierta";
                currentCajaId = data.caja.id;

                panel.innerHTML = `
                    <div class="info-box">
                        <p><strong>Cajero de turno:</strong> ${data.caja.cajero}</p>
                        <p><strong>Monto Inicial:</strong> ${data.caja.monto_inicial} Bs.</p>
                        <p><strong>Fecha Apertura:</strong> ${data.caja.fecha_apertura}</p>
                    </div>
                    <div class="form-group">
                        <label for="montoReal">Efectivo Real en Mostrador (Bs.)</label>
                        <input type="number" id="montoReal" step="0.01" min="0" placeholder="0.00 required">
                    </div>
                    <button class="btn-close" onclick="procesarCierreCaja()">Ejecutar Arqueo y Cierre</button>
                `;
            } else {
                badge.textContent = "Estado: Cerrada";
                badge.className = "status-badge cerrada";
                currentCajaId = null;

                panel.innerHTML = `
                    <div class="form-group">
                        <label for="montoInicial">Declarar Fondo Inicial de Caja (Bs.)</label>
                        <input type="number" id="montoInicial" step="0.01" min="0" value="100.00">
                    </div>
                    <button class="btn-open" onclick="procesarAperturaCaja()">Habilitar Caja de Turno</button>
                `;
            }
        } catch (error) {
            alert('Error de red al conectar con el servidor.');
        }
    }

    // Registrar Apertura de Caja
    async function procesarAperturaCaja() {
        const monto = document.getElementById('montoInicial').value;
        if(monto === "" || monto < 0) return alert("Ingrese un monto inicial válido.");

        const res = await fetch(API_URL, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({
                accion: 'apertura',
                usuario_id: 5, // Asignado a Ana Tienda por defecto
                monto_inicial: parseFloat(monto)
            })
        });

        const data = await res.json();
        if(data.success) {
            alert(data.mensaje);
            verificarEstadoCaja();
        } else {
            alert(data.error);
        }
    }

    // Registrar Cierre de Caja con Arqueo Matemático
    async function procesarCierreCaja() {
        const montoRealInput = document.getElementById('montoReal').value;
        if(montoRealInput === "" || montoRealInput < 0) return alert("Por favor declare el dinero real en físico.");

        const res = await fetch(API_URL, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({
                accion: 'cierre',
                caja_id: currentCajaId,
                monto_final_real: parseFloat(montoRealInput)
            })
        });

        const data = await res.json();
        if(data.success) {
            alert(`${data.mensaje}\n\n` +
                  `Sistema Calculó: ${data.calculado} Bs.\n` +
                  `Declarado Físico: ${data.real} Bs.\n` +
                  `Diferencia Arqueo: ${data.desfase} Bs.`);
            verificarEstadoCaja();
        } else {
            alert(data.error);
        }
    }

    // Inicializar vista
    verificarEstadoCaja();
</script>
</body>
</html>
