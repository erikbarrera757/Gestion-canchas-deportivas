<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SportManager Pro - Login</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-principal: #121212;
            --bg-tarjeta: #1e1e1e;
            --verde-sport: #198754;
            --verde-hover: #146c43;
            --texto-blanco: #e0e0e0;
            --texto-mutated: #888888;
            --borde: #2d2d2d;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-principal);
            color: var(--texto-blanco);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .login-container {
            background-color: var(--bg-tarjeta);
            border: 1px solid var(--borde);
            border-radius: 8px;
            padding: 2.5rem;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5);
        }

        .header-login {
            text-align: center;
            margin-bottom: 2rem;
        }

        .logo-icon {
            font-size: 2.5rem;
            color: var(--verde-sport);
            margin-bottom: 0.5rem;
        }

        .header-login h1 {
            font-size: 1.5rem;
            margin: 0;
            font-weight: 600;
        }

        .header-login p {
            font-size: 0.85rem;
            color: var(--texto-mutated);
            margin: 0.25rem 0 0 0;
        }

        .form-group {
            margin-bottom: 1.25rem;
            position: relative;
        }

        .form-group i {
            position: absolute;
            left: 12px;
            top: 38px;
            color: var(--texto-mutated);
        }

        label {
            display: block;
            font-size: 0.85rem;
            margin-bottom: 0.5rem;
            color: var(--texto-blanco);
        }

        input {
            width: 100%;
            background-color: var(--bg-principal);
            border: 1px solid var(--borde);
            border-radius: 6px;
            padding: 10px 10px 10px 35px;
            box-sizing: border-box;
            color: white;
            font-size: 0.95rem;
            transition: border-color 0.3s;
        }

        input:focus {
            outline: none;
            border-color: var(--verde-sport);
        }

        .btn-login {
            width: 100%;
            background-color: var(--verde-sport);
            color: white;
            border: none;
            border-radius: 6px;
            padding: 12px;
            font-size: 0.95rem;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.3s;
            margin-top: 1rem;
        }

        .btn-login:hover {
            background-color: var(--verde-hover);
        }

        .status-message {
            margin-top: 1rem;
            font-size: 0.85rem;
            text-align: center;
            display: none;
        }

        .error { color: #ff6b6b; }
        .success { color: #51cf66; }
    </style>
</head>
<body>

    <div class="login-container">
        <div class="header-login">
            <div class="logo-icon"><i class="fa-solid fa-circle-check"></i></div>
            <h1>SportManager Pro</h1>
            <p>Acceso al panel de control</p>
        </div>

        <form id="loginForm">
            <div class="form-group">
                <label for="email">Correo Electrónico</label>
                <i class="fa-solid fa-envelope"></i>
                <input type="email" id="email" required placeholder="ejemplo@correo.com">
            </div>

            <div class="form-group">
                <label for="password">Contraseña</label>
                <i class="fa-solid fa-lock"></i>
                <input type="password" id="password" required placeholder="••••••••">
            </div>

            <button type="submit" class="btn-login">Iniciar Sesión</button>
        </form>

        <div id="status" class="status-message"></div>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            // Capturamos el valor usando el nuevo ID 'email'
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const statusDiv = document.getElementById('status');

            statusDiv.style.display = 'block';
            statusDiv.className = 'status-message';
            statusDiv.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Conectando...';

            try {
                const response = await fetch('http://localhost:8080/sportmanager_api/auth/login.php', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    // Estructura exacta con "email" que decodifica tu json_decode en PHP
                    body: JSON.stringify({ email, password })
                });

                const data = await response.json();

                if (response.ok && data.success) {
                    statusDiv.className = 'status-message success';
                    statusDiv.innerText = '¡Acceso correcto! Bienvenido/a ' + data.user.nombre;
                    
                    // Guardamos la sesión local con los datos reales devueltos por el SELECT
                    localStorage.setItem('user_id', data.user.id);
                    localStorage.setItem('user_rol', data.user.rol);
                    localStorage.setItem('user_nombre', data.user.nombre);
                    
                    // Redirección automática tras el éxito
                    setTimeout(() => {
                        window.location.href = '../mantenimiento/mantenimiento.html'; 
                    }, 1500);
                } else {
                    statusDiv.className = 'status-message error';
                    statusDiv.innerText = data.error || 'Correo o contraseña incorrectos';
                }
            } catch (error) {
                statusDiv.className = 'status-message error';
                statusDiv.innerText = 'Error al conectar con el servidor backend';
                console.error(error);
            }
        });
    </script>
</body>
</html>
